services:
  - type: web
    name: image-orientation-shopify
    env: python
    rootDir: shoe-orientation
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: SHOPIFY_API_VERSION
        value: 2025-10
      - key: MIN_CONF
        value: "0.80"
